# ============================================================
# REQUEST DEPLOYMENT
# Triggered when a release is published
# Requests deployment to production environment
# Admin approves in GitHub → deploy.yml runs automatically
#
# GITEA MIGRATION:
# - Replace ubuntu-latest with self-hosted runner name
# - Replace cbcbmbtTest with Gitea org name
# - Replace github.com with gitea.company.internal
# ============================================================

name: Request Deployment

on:
  release:
    types: [published]

jobs:
  request:
    runs-on: ubuntu-latest
    environment: production
    steps:
      # ── Trigger central deploy workflow ───────────────────
      # Only runs after admin approves in GitHub
      # GITEA: replace api.github.com with gitea.company.internal/api/v1
      # GITEA: replace cbcbmbtTest with Gitea org name
      - name: Trigger deploy
        env:
          TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/cbcbmbtTest/ops/actions/workflows/deploy.yml/dispatches \
            -d "{\"ref\":\"main\",\"inputs\":{\"repo\":\"${{ github.event.repository.name }}\",\"version\":\"${{ github.event.release.tag_name }}\"}}"
