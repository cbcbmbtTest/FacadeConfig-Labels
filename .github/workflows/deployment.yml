# ============================================================
# REQUEST DEPLOYMENT (LABELS FLOW)
# On release → creates an Issue in ops-labels with
# "Pending Approval" label. Admin changes label to "Approved"
# to trigger deployment.
#
# GITEA MIGRATION:
# - Replace api.github.com with gitea.company.internal/api/v1
# - Replace cbcbmbtTest with Gitea org name
# ============================================================

name: Request Deployment

on:
  release:
    types: [published]

jobs:
  create-issue:
    runs-on: ubuntu-latest
    steps:
      - name: Create deployment issue
        env:
          TOKEN: ${{ secrets.REGISTRY_TOKEN }}
          REPO_NAME: ${{ github.event.repository.name }}
          TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
        run: |
          curl -X POST \
            -H "Authorization: token $TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/cbcbmbtTest/ops-labels/issues \
            -d "{
              \"title\": \"Deploy $REPO_NAME $TAG\",
              \"body\": \"App: $REPO_NAME\nVersion: $TAG\nRelease: $RELEASE_URL\n\nTo approve: change label to Approved\nTo reject: close this issue\",
              \"labels\": [\"Pending Approval\"]
            }"
